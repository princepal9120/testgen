name: Bug report
description: Report a reproducible defect in TestGen.
title: "[Bug] "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce.
  - type: input
    id: version
    attributes:
      label: TestGen version
      description: Output of `testgen --version`
      placeholder: v0.x.x
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Include full command with flags.
      placeholder: testgen generate --path=./src --recursive
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and output
      description: Paste relevant output. Remove secrets.
      render: shell
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Files or steps needed to reproduce.
    validations:
      required: true
